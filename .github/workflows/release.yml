name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_version:
        description: Release version to publish, for example `0.4.2`
        required: true
        type: string

permissions:
  contents: write

env:
  JAVA_VERSION: 21

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: release
    env:
      MANUAL_RELEASE_VERSION: ${{ inputs.release_version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release coordinates
        id: release
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag_name="${{ github.event.release.tag_name }}"
          else
            tag_name="v${MANUAL_RELEASE_VERSION}"
          fi

          release_version="${tag_name#v}"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Check out release tag
        run: |
          git fetch --force --tags origin
          git checkout "${{ steps.release.outputs.tag_name }}"

      - name: Set release version in workspace
        run: >
          mvn -B clean versions:set
          -DnewVersion=${{ steps.release.outputs.release_version }}
          -DgenerateBackupPoms=false --no-transfer-progress

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven
          server-id: central
          server-username: MAVEN_CENTRAL_USERNAME
          server-password: MAVEN_CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish release to Maven Central
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: ./mvnw -B -P release clean deploy --no-transfer-progress

  prepare-next-version:
    needs:
      - publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main

      - name: Resolve next development version
        id: next-version
        env:
          MANUAL_RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            release_version="${{ github.event.release.tag_name }}"
            release_version="${release_version#v}"
          else
            release_version="${MANUAL_RELEASE_VERSION}"
          fi

          base_version="${release_version%%-*}"
          IFS='.' read -r major minor patch <<EOF
          ${base_version}
          EOF

          next_patch=$((patch + 1))
          next_version="${major}.${minor}.${next_patch}-SNAPSHOT"

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "next_version=${next_version}" >> "${GITHUB_OUTPUT}"

      - name: Set next development version
        if: false # disable bump version today
        run: >
          ./mvnw -B versions:set
          -DnewVersion=${{ steps.next-version.outputs.next_version }}
          -DgenerateBackupPoms=false --no-transfer-progress

      - name: Commit and push next development version
        env:
          NEXT_VERSION: ${{ steps.next-version.outputs.next_version }}
        run: |
          if git diff --quiet -- 'pom.xml' '**/pom.xml'; then
            echo "main is already set to ${NEXT_VERSION}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]`@users.noreply.github.com`"
          git add -- 'pom.xml' '**/pom.xml'
          git commit -m "chore: prepare for next development iteration ${NEXT_VERSION}"
          git push origin HEAD:main
