name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  merge_group:
    types: [ checks_requested ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  pull-requests: write
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        java:
          - 21
          - 25
          - 26
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Build and Verify
        run: mvn verify --no-transfer-progress

      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/target/*-reports/TEST-*.xml'
          check_name: Test Report (JDK ${{ matrix.java }})
          detailed_summary: true
          flaky_summary: true
          include_passed: false
          fail_on_failure: true
          require_tests: true
          comment: true
          job_summary: true

      - name: Publish coverage report
        uses: madrapps/jacoco-report@v1.8.0
        if: always()
        with:
          paths: 'reports/target/site/jacoco-aggregate/jacoco.xml'
          title: Coverage Report (JDK ${{ matrix.java }})
          update-comment: ${{ github.event_name == 'pull_request' }}
          min-coverage-changed-files: 80
          summary-format: table
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports-jdk-${{ matrix.java }}
          path: |
            **/target/*-reports/**
            reports/target/site/jacoco-aggregate/

  examples:
    strategy:
      fail-fast: false
      matrix:
        java:
          - 21
        example:
          - weather
    runs-on: ubuntu-latest
    timeout-minutes: 7

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Install jar
        run: mvn install -pl tachyon-server -am -DskipTests --no-transfer-progress


      - name: Verify examples
        run: mvn verify -f examples/${{ matrix.example }}/pom.xml -Dtachyon-server.version=1.0.0-SNAPSHOT --no-transfer-progress

      - name: Publish test results
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: 'examples/${{ matrix.example }}/target/*-reports/TEST-*.xml'
          check_name: 'Test Report: ${{ matrix.example }} (JDK ${{ matrix.java }})'
          detailed_summary: true
          flaky_summary: true
          include_passed: false
          fail_on_failure: true
          require_tests: true
          comment: true
          job_summary: true

      - name: Upload reports as artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: reports-jdk-${{ matrix.java }}
          path: '**/target/*-reports/**'

